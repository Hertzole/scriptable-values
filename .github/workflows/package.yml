name: Release Package

on:
  release:
    types:
      - published

jobs:
  package:
    name: Deploy release package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: fast-actions/setup-dotnet@v1
      with:
        sdk-version: '8.x'

    - name: Test generator
      run: |
        cd Generator
        dotnet build -c Release
        dotnet test -c Release --no-build --verbosity normal

    - name: Create release package
      uses: Hertzole/upm-package@master
      id: upm-release
      with:
        branch-name: 'package'
        signing-key-id: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
        signing-key-secret: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
        signing-org-id: ${{ secrets.UPM_ORG_ID }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to release
      if: steps.upm-release.outputs.created-archive == 'true'
      uses: xresloader/upload-to-github-release@v1
      with:
        file: ${{ steps.upm-release.outputs.signed-archive }}
        update_latest_release: true